<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quizz Disney</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Quizz Disney</h1>
      <p>Réponds aux questions et découvre ton score !</p>
    </header>

    <main>
      <div class="quiz-card">
        <div class="question-bar">
          <span id="level">Niveau 1</span>
          <span id="score">Score : 0</span>
        </div>

        <div id="question-box" class="question-box">
          <p id="question-text">Appuie sur Commencer pour lancer le quiz.</p>
        </div>

        <div id="answers" class="answers"></div>

        <div id="feedback" class="feedback"></div>

        <div class="controls">
          <button id="start-btn" class="btn">Commencer</button>
          <button id="next-btn" class="btn hidden">Question suivante</button>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
